name: Load Test (Azure App Testing)

on:
  # Run after successful app deployment to dev
  workflow_run:
    workflows: ["Deploy Application"]
    types:
      - completed
    branches:
      - main
  # Allow manual trigger for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  load-test:
    name: Run BFF Load Test
    runs-on: ubuntu-latest
    # Only run if manually dispatched, or if the triggering workflow was a
    # push-based deploy (not a manual staging/prod dispatch) that succeeded.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve infrastructure outputs
        id: infra
        run: |
          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful infrastructure deployment found"
            exit 1
          fi
          echo "Using infrastructure deployment: $DEPLOYMENT_NAME"
          DEPLOYMENT=$(az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs)

          LOAD_TEST_NAME=$(echo "$DEPLOYMENT" | jq -r '.loadTestName.value')
          BFF_APP_NAME=$(echo "$DEPLOYMENT" | jq -r '.bffAppName.value')
          KEY_VAULT_NAME=$(echo "$DEPLOYMENT" | jq -r '.keyVaultName.value')

          if [ "$LOAD_TEST_NAME" = "null" ] || [ -z "$LOAD_TEST_NAME" ]; then
            echo "::error::Load test resource name not found in deployment outputs. Deploy infrastructure first."
            exit 1
          fi

          echo "load-test-resource=$LOAD_TEST_NAME" >> $GITHUB_OUTPUT

          # Resolve BFF URL from Container App
          BFF_FQDN=$(az containerapp show \
            --name "$BFF_APP_NAME" \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || echo "")

          if [ -z "$BFF_FQDN" ]; then
            echo "::error::Could not resolve BFF Container App URL. Ensure the app is deployed."
            exit 1
          fi

          echo "bff-host=$BFF_FQDN" >> $GITHUB_OUTPUT
          echo "key-vault-name=$KEY_VAULT_NAME" >> $GITHUB_OUTPUT
          echo "BFF Host: $BFF_FQDN"

      - name: Patch Key Vault secret URI into ALT config
        run: |
          KV_NAME="${{ steps.infra.outputs.key-vault-name }}"
          KV_SECRET_URI="https://${KV_NAME}.vault.azure.net/secrets/loadtest-client-secret/"
          # Write patched copy alongside the JMX so relative testPlan path resolves
          sed "s|__KEYVAULT_SECRET_URI__|${KV_SECRET_URI}|g" \
            tests/load/load-test-config.yaml > tests/load/load-test-config-run.yaml
          echo "Patched TOKEN_CLIENT_SECRET URI: ${KV_SECRET_URI}"

      - name: Build load test parameters
        id: lt-params
        run: |
          # Sanitize inputs: strip stray \r / \n that may be embedded in
          # GitHub variables (e.g. TOKEN_SCOPE pasted with Windows line
          # endings).  These break the Entra ID token request.
          CLEAN_HOST=$(printf '%s' "${{ steps.infra.outputs.bff-host }}" | tr -d '\r\n')
          CLEAN_TENANT=$(printf '%s' "${{ vars.AZURE_TENANT_ID }}" | tr -d '\r\n')
          CLEAN_CLIENT=$(printf '%s' "${{ vars.LOADTEST_CLIENT_ID }}" | tr -d '\r\n')
          CLEAN_SCOPE=$(printf '%s' "${{ vars.LOADTEST_TOKEN_SCOPE }}" | tr -d '\r\n')

          ENV_JSON=$(jq -c -n \
            --arg host            "$CLEAN_HOST" \
            --arg tenant          "$CLEAN_TENANT" \
            --arg client          "$CLEAN_CLIENT" \
            --arg scope           "$CLEAN_SCOPE" \
            '[
              {"name":"TARGET_HOST",       "value":$host},
              {"name":"TARGET_PORT",       "value":"443"},
              {"name":"PROTOCOL",          "value":"https"},
              {"name":"TENANT_ID",         "value":$tenant},
              {"name":"TOKEN_CLIENT_ID",   "value":$client},
              {"name":"TOKEN_SCOPE",       "value":$scope},
              {"name":"RAMP_UP_SECONDS",   "value":"60"},
              {"name":"DURATION_SECONDS",  "value":"180"},
              {"name":"CATALOG_THREADS",   "value":"100"},
              {"name":"SEARCH_THREADS",    "value":"50"},
              {"name":"CHAT_THREADS",      "value":"20"}
            ]')
          echo "env-json=$ENV_JSON" >> "$GITHUB_OUTPUT"

      - name: Run Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: tests/load/load-test-config-run.yaml
          loadTestResource: ${{ steps.infra.outputs.load-test-resource }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          env: ${{ steps.lt-params.outputs.env-json }}

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: load-test-results
          path: ${{ github.workspace }}/loadTest
          retention-days: 30
