name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend and shared
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Lint BFF
        working-directory: src/bff
        run: uv run ruff check .

      - name: Check BFF formatting
        working-directory: src/bff
        run: uv run ruff format --check .

      - name: Lint Indexer
        working-directory: src/indexer
        run: uv run ruff check .

      - name: Check Indexer formatting
        working-directory: src/indexer
        run: uv run ruff format --check .

      - name: Lint Governance Worker
        working-directory: src/governance-worker
        run: uv run ruff check .

      - name: Check Governance Worker formatting
        working-directory: src/governance-worker
        run: uv run ruff format --check .

      - name: Lint Analytics Processor
        working-directory: src/analytics-processor
        run: uv run ruff check .

      - name: Check Analytics Processor formatting
        working-directory: src/analytics-processor
        run: uv run ruff format --check .

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@apic-vibe-portal/shared

      - name: Type check
        run: npx tsc --noEmit

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@apic-vibe-portal/shared

      - name: Run frontend tests
        run: npm run test --workspace=@apic-vibe-portal/frontend

  e2e-frontend:
    name: E2E Tests (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@apic-vibe-portal/shared

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/frontend

      - name: Build frontend
        run: npm run build --workspace=@apic-vibe-portal/frontend

      - name: Run E2E tests
        run: npm run test:e2e:chromium --workspace=@apic-vibe-portal/frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 30

  test-bff:
    name: Test BFF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/bff
        run: uv sync

      - name: Run BFF tests
        working-directory: src/bff
        run: uv run pytest

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@apic-vibe-portal/shared

      - name: Build frontend
        run: npm run build --workspace=@apic-vibe-portal/frontend

  test-indexer:
    name: Test Indexer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/indexer
        run: uv sync

      - name: Run Indexer tests
        working-directory: src/indexer
        run: uv run pytest

  build-bff:
    name: Build BFF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/bff
        run: uv sync

      - name: Validate BFF
        working-directory: src/bff
        run: uv run python -m compileall .

  build-indexer:
    name: Build Indexer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/indexer
        run: uv sync

      - name: Validate Indexer
        working-directory: src/indexer
        run: uv run python -m compileall .

  test-governance-worker:
    name: Test Governance Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/governance-worker
        run: uv sync

      - name: Run Governance Worker tests
        working-directory: src/governance-worker
        run: uv run pytest

  build-governance-worker:
    name: Build Governance Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/governance-worker
        run: uv sync

      - name: Validate Governance Worker
        working-directory: src/governance-worker
        run: uv run python -m compileall .

  test-analytics-processor:
    name: Test Analytics Processor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/analytics-processor
        run: uv sync

      - name: Run Analytics Processor tests
        working-directory: src/analytics-processor
        run: uv run pytest

  build-analytics-processor:
    name: Build Analytics Processor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        working-directory: src/analytics-processor
        run: uv sync

      - name: Validate Analytics Processor
        working-directory: src/analytics-processor
        run: uv run python -m compileall .
