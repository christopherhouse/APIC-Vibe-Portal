name: Deploy Application

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  prepare:
    name: Resolve ACR
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      acr-name: ${{ steps.acr.outputs.name }}
      acr-login-server: ${{ steps.acr.outputs.login-server }}
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR name
        id: acr
        run: |
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"

          # Wait for any in-progress infra deployment before reading outputs.
          # This prevents a race condition when infra and app deployments are
          # triggered simultaneously by the same push (e.g. a commit that
          # touches both infra/** and src/**). Without this wait, the workflow
          # would find the *previous* successful deployment (which may predate
          # the governance identity) while the new infra run is still running.
          MAX_WAIT_SECS=1800
          WAITED=0
          RUNNING_INFRA=$(az deployment group list \
            --resource-group "$RG" \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Running'].name | [0]" \
            -o tsv)
          while [ -n "$RUNNING_INFRA" ] && [ "$WAITED" -lt "$MAX_WAIT_SECS" ]; do
            echo "Infrastructure deployment '$RUNNING_INFRA' is in progress. Waiting 30s (${WAITED}s elapsed)..."
            sleep 30
            WAITED=$((WAITED + 30))
            RUNNING_INFRA=$(az deployment group list \
              --resource-group "$RG" \
              --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Running'].name | [0]" \
              -o tsv)
          done
          if [ -n "$RUNNING_INFRA" ]; then
            echo "::warning::Timed out waiting for infrastructure deployment '$RUNNING_INFRA'. Proceeding with the latest successful deployment."
          fi

          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group "$RG" \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful infrastructure deployment found in resource group ${{ vars.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
          echo "Using infrastructure deployment: $DEPLOYMENT_NAME"
          ACR_NAME=$(az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs.acrName.value -o tsv)
          echo "name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "login-server=${ACR_NAME}.azurecr.io" >> $GITHUB_OUTPUT

  build-containers:
    name: Build and Push ${{ matrix.component }} Image
    runs-on: ubuntu-latest
    environment: dev
    needs: prepare
    strategy:
      matrix:
        include:
          - component: frontend
            dockerfile: ./src/frontend/Dockerfile
          - component: bff
            dockerfile: ./src/bff/Dockerfile
          - component: indexer
            dockerfile: ./src/indexer/Dockerfile
          - component: governance-worker
            dockerfile: ./src/governance-worker/Dockerfile
    outputs:
      # All matrix variants produce the same git-ref-based tag, so last-writer is stable.
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ needs.prepare.outputs.acr-name }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.acr-login-server }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-containers]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
    environment:
      name: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment outputs
        id: infra
        run: |
          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful infrastructure deployment found in resource group ${{ vars.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
          echo "Using infrastructure deployment: $DEPLOYMENT_NAME"
          DEPLOYMENT=$(az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs)
          echo "container-apps-env=$(echo $DEPLOYMENT | jq -r '.containerAppsEnvironmentId.value')" >> $GITHUB_OUTPUT
          echo "frontend-app=$(echo $DEPLOYMENT | jq -r '.frontendAppName.value')" >> $GITHUB_OUTPUT
          echo "bff-app=$(echo $DEPLOYMENT | jq -r '.bffAppName.value')" >> $GITHUB_OUTPUT
          echo "acr-server=$(echo $DEPLOYMENT | jq -r '.acrLoginServer.value')" >> $GITHUB_OUTPUT
          echo "redis-host=$(echo $DEPLOYMENT | jq -r '.redisCacheHostName.value')" >> $GITHUB_OUTPUT
          echo "ai-search-endpoint=$(echo $DEPLOYMENT | jq -r '.aiSearchEndpoint.value')" >> $GITHUB_OUTPUT
          echo "openai-endpoint=$(echo $DEPLOYMENT | jq -r '.openAiEndpoint.value')" >> $GITHUB_OUTPUT
          echo "foundry-endpoint=$(echo $DEPLOYMENT | jq -r '.foundryEndpoint.value')" >> $GITHUB_OUTPUT
          echo "api-center-endpoint=$(echo $DEPLOYMENT | jq -r '.apiCenterEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-endpoint=$(echo $DEPLOYMENT | jq -r '.cosmosDbEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-database-name=$(echo $DEPLOYMENT | jq -r '.cosmosDbDatabaseName.value')" >> $GITHUB_OUTPUT
          echo "appinsights-connection-string=$(echo $DEPLOYMENT | jq -r '.appInsightsConnectionString.value')" >> $GITHUB_OUTPUT

          # Extract identity outputs from deployment
          FRONTEND_ID=$(echo $DEPLOYMENT | jq -r '.frontendIdentityResourceId.value')
          BFF_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityResourceId.value')
          BFF_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityClientId.value')
          INDEXER_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityResourceId.value')
          INDEXER_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityClientId.value')
          GOVERNANCE_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityResourceId.value')
          GOVERNANCE_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityClientId.value')

          # Fallback: resolve identities directly from Azure if deployment outputs are missing
          # This handles the case where infra was deployed before identity outputs were added
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ "$FRONTEND_ID" = "null" ] || [ -z "$FRONTEND_ID" ]; then
            echo "::warning::Frontend identity not found in deployment outputs, resolving from resource group..."
            FRONTEND_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-frontend-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_ID" = "null" ] || [ -z "$BFF_ID" ]; then
            echo "::warning::BFF identity not found in deployment outputs, resolving from resource group..."
            BFF_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_CLIENT_ID" = "null" ] || [ -z "$BFF_CLIENT_ID" ]; then
            echo "::warning::BFF identity client ID not found in deployment outputs, resolving from resource group..."
            BFF_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].clientId | [0]" -o tsv)
          fi
          if [ "$INDEXER_ID" = "null" ] || [ -z "$INDEXER_ID" ]; then
            echo "::warning::Indexer identity not found in deployment outputs, resolving from resource group..."
            INDEXER_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].id | [0]" -o tsv)
          fi
          if [ "$INDEXER_CLIENT_ID" = "null" ] || [ -z "$INDEXER_CLIENT_ID" ]; then
            echo "::warning::Indexer identity client ID not found in deployment outputs, resolving from resource group..."
            INDEXER_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].clientId | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_ID" = "null" ] || [ -z "$GOVERNANCE_ID" ]; then
            echo "::warning::Governance identity not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].id | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_CLIENT_ID" = "null" ] || [ -z "$GOVERNANCE_CLIENT_ID" ]; then
            echo "::warning::Governance identity client ID not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].clientId | [0]" -o tsv)
          fi

          IDENTITY_ERRORS=""
          if [ -z "$FRONTEND_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} frontend-identity-resource-id"; fi
          if [ -z "$BFF_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-resource-id"; fi
          if [ -z "$BFF_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-client-id"; fi
          if [ -z "$INDEXER_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-resource-id"; fi
          if [ -z "$INDEXER_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-client-id"; fi
          if [ -z "$GOVERNANCE_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-resource-id"; fi
          if [ -z "$GOVERNANCE_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-client-id"; fi
          if [ -n "$IDENTITY_ERRORS" ]; then
            echo "::error::Could not resolve managed identities:${IDENTITY_ERRORS}. Ensure infrastructure is deployed with per-container UAMIs."
            exit 1
          fi

          echo "frontend-identity-resource-id=$FRONTEND_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-resource-id=$BFF_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-client-id=$BFF_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-resource-id=$INDEXER_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-client-id=$INDEXER_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-resource-id=$GOVERNANCE_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-client-id=$GOVERNANCE_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Deploy Container Apps
        run: |
          chmod +x scripts/deploy-container-apps.sh
          ./scripts/deploy-container-apps.sh \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --environment-id ${{ steps.infra.outputs.container-apps-env }} \
            --frontend-app ${{ steps.infra.outputs.frontend-app }} \
            --bff-app ${{ steps.infra.outputs.bff-app }} \
            --acr-server ${{ steps.infra.outputs.acr-server }} \
            --frontend-identity-resource-id "${{ steps.infra.outputs.frontend-identity-resource-id }}" \
            --bff-identity-resource-id "${{ steps.infra.outputs.bff-identity-resource-id }}" \
            --bff-identity-client-id "${{ steps.infra.outputs.bff-identity-client-id }}" \
            --redis-host ${{ steps.infra.outputs.redis-host }} \
            --bff-env-vars "BFF_ENTRA_TENANT_ID=${{ vars.AZURE_TENANT_ID }} BFF_ENTRA_CLIENT_ID=${{ vars.BFF_ENTRA_CLIENT_ID }} BFF_ENTRA_AUDIENCE=${{ vars.BFF_ENTRA_AUDIENCE }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} OPENAI_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} FOUNDRY_PROJECT_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-env-vars "MSAL_CLIENT_ID=${{ vars.MSAL_CLIENT_ID }} MSAL_AUTHORITY=https://login.microsoftonline.com/${{ vars.AZURE_TENANT_ID }} MSAL_REDIRECT_URI=${{ vars.MSAL_REDIRECT_URI }} BFF_API_SCOPE=${{ vars.BFF_API_SCOPE }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --bff-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-identity-resource-id "${{ steps.infra.outputs.indexer-identity-resource-id }}" \
            --indexer-identity-client-id "${{ steps.infra.outputs.indexer-identity-client-id }}" \
            --indexer-env-vars "AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} OPENAI_ENDPOINT=${{ steps.infra.outputs.openai-endpoint }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }} OPENAI_API_VERSION=${{ vars.OPENAI_API_VERSION }}"
            --governance-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --governance-identity-resource-id "${{ steps.infra.outputs.governance-identity-resource-id }}" \
            --governance-identity-client-id "${{ steps.infra.outputs.governance-identity-client-id }}" \
            --governance-env-vars "API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-containers]
    if: github.event.inputs.environment == 'staging'
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment outputs
        id: infra
        run: |
          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful infrastructure deployment found in resource group ${{ vars.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
          echo "Using infrastructure deployment: $DEPLOYMENT_NAME"
          DEPLOYMENT=$(az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs)
          echo "container-apps-env=$(echo $DEPLOYMENT | jq -r '.containerAppsEnvironmentId.value')" >> $GITHUB_OUTPUT
          echo "frontend-app=$(echo $DEPLOYMENT | jq -r '.frontendAppName.value')" >> $GITHUB_OUTPUT
          echo "bff-app=$(echo $DEPLOYMENT | jq -r '.bffAppName.value')" >> $GITHUB_OUTPUT
          echo "acr-server=$(echo $DEPLOYMENT | jq -r '.acrLoginServer.value')" >> $GITHUB_OUTPUT
          echo "redis-host=$(echo $DEPLOYMENT | jq -r '.redisCacheHostName.value')" >> $GITHUB_OUTPUT
          echo "ai-search-endpoint=$(echo $DEPLOYMENT | jq -r '.aiSearchEndpoint.value')" >> $GITHUB_OUTPUT
          echo "openai-endpoint=$(echo $DEPLOYMENT | jq -r '.openAiEndpoint.value')" >> $GITHUB_OUTPUT
          echo "foundry-endpoint=$(echo $DEPLOYMENT | jq -r '.foundryEndpoint.value')" >> $GITHUB_OUTPUT
          echo "api-center-endpoint=$(echo $DEPLOYMENT | jq -r '.apiCenterEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-endpoint=$(echo $DEPLOYMENT | jq -r '.cosmosDbEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-database-name=$(echo $DEPLOYMENT | jq -r '.cosmosDbDatabaseName.value')" >> $GITHUB_OUTPUT
          echo "appinsights-connection-string=$(echo $DEPLOYMENT | jq -r '.appInsightsConnectionString.value')" >> $GITHUB_OUTPUT

          # Extract identity outputs from deployment
          FRONTEND_ID=$(echo $DEPLOYMENT | jq -r '.frontendIdentityResourceId.value')
          BFF_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityResourceId.value')
          BFF_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityClientId.value')
          INDEXER_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityResourceId.value')
          INDEXER_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityClientId.value')
          GOVERNANCE_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityResourceId.value')
          GOVERNANCE_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityClientId.value')

          # Fallback: resolve identities directly from Azure if deployment outputs are missing
          # This handles the case where infra was deployed before identity outputs were added
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ "$FRONTEND_ID" = "null" ] || [ -z "$FRONTEND_ID" ]; then
            echo "::warning::Frontend identity not found in deployment outputs, resolving from resource group..."
            FRONTEND_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-frontend-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_ID" = "null" ] || [ -z "$BFF_ID" ]; then
            echo "::warning::BFF identity not found in deployment outputs, resolving from resource group..."
            BFF_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_CLIENT_ID" = "null" ] || [ -z "$BFF_CLIENT_ID" ]; then
            echo "::warning::BFF identity client ID not found in deployment outputs, resolving from resource group..."
            BFF_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].clientId | [0]" -o tsv)
          fi
          if [ "$INDEXER_ID" = "null" ] || [ -z "$INDEXER_ID" ]; then
            echo "::warning::Indexer identity not found in deployment outputs, resolving from resource group..."
            INDEXER_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].id | [0]" -o tsv)
          fi
          if [ "$INDEXER_CLIENT_ID" = "null" ] || [ -z "$INDEXER_CLIENT_ID" ]; then
            echo "::warning::Indexer identity client ID not found in deployment outputs, resolving from resource group..."
            INDEXER_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].clientId | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_ID" = "null" ] || [ -z "$GOVERNANCE_ID" ]; then
            echo "::warning::Governance identity not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].id | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_CLIENT_ID" = "null" ] || [ -z "$GOVERNANCE_CLIENT_ID" ]; then
            echo "::warning::Governance identity client ID not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].clientId | [0]" -o tsv)
          fi

          IDENTITY_ERRORS=""
          if [ -z "$FRONTEND_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} frontend-identity-resource-id"; fi
          if [ -z "$BFF_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-resource-id"; fi
          if [ -z "$BFF_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-client-id"; fi
          if [ -z "$INDEXER_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-resource-id"; fi
          if [ -z "$INDEXER_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-client-id"; fi
          if [ -z "$GOVERNANCE_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-resource-id"; fi
          if [ -z "$GOVERNANCE_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-client-id"; fi
          if [ -n "$IDENTITY_ERRORS" ]; then
            echo "::error::Could not resolve managed identities:${IDENTITY_ERRORS}. Ensure infrastructure is deployed with per-container UAMIs."
            exit 1
          fi

          echo "frontend-identity-resource-id=$FRONTEND_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-resource-id=$BFF_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-client-id=$BFF_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-resource-id=$INDEXER_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-client-id=$INDEXER_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-resource-id=$GOVERNANCE_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-client-id=$GOVERNANCE_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Deploy Container Apps
        run: |
          chmod +x scripts/deploy-container-apps.sh
          ./scripts/deploy-container-apps.sh \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --environment-id ${{ steps.infra.outputs.container-apps-env }} \
            --frontend-app ${{ steps.infra.outputs.frontend-app }} \
            --bff-app ${{ steps.infra.outputs.bff-app }} \
            --acr-server ${{ steps.infra.outputs.acr-server }} \
            --frontend-identity-resource-id "${{ steps.infra.outputs.frontend-identity-resource-id }}" \
            --bff-identity-resource-id "${{ steps.infra.outputs.bff-identity-resource-id }}" \
            --bff-identity-client-id "${{ steps.infra.outputs.bff-identity-client-id }}" \
            --redis-host ${{ steps.infra.outputs.redis-host }} \
            --bff-env-vars "BFF_ENTRA_TENANT_ID=${{ vars.AZURE_TENANT_ID }} BFF_ENTRA_CLIENT_ID=${{ vars.BFF_ENTRA_CLIENT_ID }} BFF_ENTRA_AUDIENCE=${{ vars.BFF_ENTRA_AUDIENCE }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} OPENAI_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} FOUNDRY_PROJECT_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-env-vars "MSAL_CLIENT_ID=${{ vars.MSAL_CLIENT_ID }} MSAL_AUTHORITY=https://login.microsoftonline.com/${{ vars.AZURE_TENANT_ID }} MSAL_REDIRECT_URI=${{ vars.MSAL_REDIRECT_URI }} BFF_API_SCOPE=${{ vars.BFF_API_SCOPE }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --bff-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-identity-resource-id "${{ steps.infra.outputs.indexer-identity-resource-id }}" \
            --indexer-identity-client-id "${{ steps.infra.outputs.indexer-identity-client-id }}" \
            --indexer-env-vars "AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} OPENAI_ENDPOINT=${{ steps.infra.outputs.openai-endpoint }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }} OPENAI_API_VERSION=${{ vars.OPENAI_API_VERSION }}"
            --governance-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --governance-identity-resource-id "${{ steps.infra.outputs.governance-identity-resource-id }}" \
            --governance-identity-client-id "${{ steps.infra.outputs.governance-identity-client-id }}" \
            --governance-env-vars "API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}"

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-containers]
    if: github.event.inputs.environment == 'prod'
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployment outputs
        id: infra
        run: |
          DEPLOYMENT_NAME=$(az deployment group list \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "[?starts_with(name, 'deploy-infra-') && properties.provisioningState=='Succeeded'] | sort_by(@, &properties.timestamp) | [-1].name" \
            -o tsv)
          if [ -z "$DEPLOYMENT_NAME" ]; then
            echo "::error::No successful infrastructure deployment found in resource group ${{ vars.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi
          echo "Using infrastructure deployment: $DEPLOYMENT_NAME"
          DEPLOYMENT=$(az deployment group show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --name "$DEPLOYMENT_NAME" \
            --query properties.outputs)
          echo "container-apps-env=$(echo $DEPLOYMENT | jq -r '.containerAppsEnvironmentId.value')" >> $GITHUB_OUTPUT
          echo "frontend-app=$(echo $DEPLOYMENT | jq -r '.frontendAppName.value')" >> $GITHUB_OUTPUT
          echo "bff-app=$(echo $DEPLOYMENT | jq -r '.bffAppName.value')" >> $GITHUB_OUTPUT
          echo "acr-server=$(echo $DEPLOYMENT | jq -r '.acrLoginServer.value')" >> $GITHUB_OUTPUT
          echo "redis-host=$(echo $DEPLOYMENT | jq -r '.redisCacheHostName.value')" >> $GITHUB_OUTPUT
          echo "ai-search-endpoint=$(echo $DEPLOYMENT | jq -r '.aiSearchEndpoint.value')" >> $GITHUB_OUTPUT
          echo "openai-endpoint=$(echo $DEPLOYMENT | jq -r '.openAiEndpoint.value')" >> $GITHUB_OUTPUT
          echo "foundry-endpoint=$(echo $DEPLOYMENT | jq -r '.foundryEndpoint.value')" >> $GITHUB_OUTPUT
          echo "api-center-endpoint=$(echo $DEPLOYMENT | jq -r '.apiCenterEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-endpoint=$(echo $DEPLOYMENT | jq -r '.cosmosDbEndpoint.value')" >> $GITHUB_OUTPUT
          echo "cosmos-db-database-name=$(echo $DEPLOYMENT | jq -r '.cosmosDbDatabaseName.value')" >> $GITHUB_OUTPUT
          echo "appinsights-connection-string=$(echo $DEPLOYMENT | jq -r '.appInsightsConnectionString.value')" >> $GITHUB_OUTPUT

          # Extract identity outputs from deployment
          FRONTEND_ID=$(echo $DEPLOYMENT | jq -r '.frontendIdentityResourceId.value')
          BFF_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityResourceId.value')
          BFF_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.bffIdentityClientId.value')
          INDEXER_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityResourceId.value')
          INDEXER_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.indexerIdentityClientId.value')
          GOVERNANCE_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityResourceId.value')
          GOVERNANCE_CLIENT_ID=$(echo $DEPLOYMENT | jq -r '.governanceIdentityClientId.value')

          # Fallback: resolve identities directly from Azure if deployment outputs are missing
          # This handles the case where infra was deployed before identity outputs were added
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          if [ "$FRONTEND_ID" = "null" ] || [ -z "$FRONTEND_ID" ]; then
            echo "::warning::Frontend identity not found in deployment outputs, resolving from resource group..."
            FRONTEND_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-frontend-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_ID" = "null" ] || [ -z "$BFF_ID" ]; then
            echo "::warning::BFF identity not found in deployment outputs, resolving from resource group..."
            BFF_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].id | [0]" -o tsv)
          fi
          if [ "$BFF_CLIENT_ID" = "null" ] || [ -z "$BFF_CLIENT_ID" ]; then
            echo "::warning::BFF identity client ID not found in deployment outputs, resolving from resource group..."
            BFF_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-bff-')].clientId | [0]" -o tsv)
          fi
          if [ "$INDEXER_ID" = "null" ] || [ -z "$INDEXER_ID" ]; then
            echo "::warning::Indexer identity not found in deployment outputs, resolving from resource group..."
            INDEXER_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].id | [0]" -o tsv)
          fi
          if [ "$INDEXER_CLIENT_ID" = "null" ] || [ -z "$INDEXER_CLIENT_ID" ]; then
            echo "::warning::Indexer identity client ID not found in deployment outputs, resolving from resource group..."
            INDEXER_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-indexer-')].clientId | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_ID" = "null" ] || [ -z "$GOVERNANCE_ID" ]; then
            echo "::warning::Governance identity not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].id | [0]" -o tsv)
          fi
          if [ "$GOVERNANCE_CLIENT_ID" = "null" ] || [ -z "$GOVERNANCE_CLIENT_ID" ]; then
            echo "::warning::Governance identity client ID not found in deployment outputs, resolving from resource group..."
            GOVERNANCE_CLIENT_ID=$(az identity list --resource-group "$RG" \
              --query "[?contains(name, '-id-governance-')].clientId | [0]" -o tsv)
          fi

          IDENTITY_ERRORS=""
          if [ -z "$FRONTEND_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} frontend-identity-resource-id"; fi
          if [ -z "$BFF_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-resource-id"; fi
          if [ -z "$BFF_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} bff-identity-client-id"; fi
          if [ -z "$INDEXER_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-resource-id"; fi
          if [ -z "$INDEXER_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} indexer-identity-client-id"; fi
          if [ -z "$GOVERNANCE_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-resource-id"; fi
          if [ -z "$GOVERNANCE_CLIENT_ID" ]; then IDENTITY_ERRORS="${IDENTITY_ERRORS} governance-identity-client-id"; fi
          if [ -n "$IDENTITY_ERRORS" ]; then
            echo "::error::Could not resolve managed identities:${IDENTITY_ERRORS}. Ensure infrastructure is deployed with per-container UAMIs."
            exit 1
          fi

          echo "frontend-identity-resource-id=$FRONTEND_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-resource-id=$BFF_ID" >> $GITHUB_OUTPUT
          echo "bff-identity-client-id=$BFF_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-resource-id=$INDEXER_ID" >> $GITHUB_OUTPUT
          echo "indexer-identity-client-id=$INDEXER_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-resource-id=$GOVERNANCE_ID" >> $GITHUB_OUTPUT
          echo "governance-identity-client-id=$GOVERNANCE_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Deploy Container Apps
        run: |
          chmod +x scripts/deploy-container-apps.sh
          ./scripts/deploy-container-apps.sh \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --environment-id ${{ steps.infra.outputs.container-apps-env }} \
            --frontend-app ${{ steps.infra.outputs.frontend-app }} \
            --bff-app ${{ steps.infra.outputs.bff-app }} \
            --acr-server ${{ steps.infra.outputs.acr-server }} \
            --frontend-identity-resource-id "${{ steps.infra.outputs.frontend-identity-resource-id }}" \
            --bff-identity-resource-id "${{ steps.infra.outputs.bff-identity-resource-id }}" \
            --bff-identity-client-id "${{ steps.infra.outputs.bff-identity-client-id }}" \
            --redis-host ${{ steps.infra.outputs.redis-host }} \
            --bff-env-vars "BFF_ENTRA_TENANT_ID=${{ vars.AZURE_TENANT_ID }} BFF_ENTRA_CLIENT_ID=${{ vars.BFF_ENTRA_CLIENT_ID }} BFF_ENTRA_AUDIENCE=${{ vars.BFF_ENTRA_AUDIENCE }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} OPENAI_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} FOUNDRY_PROJECT_ENDPOINT=${{ steps.infra.outputs.foundry-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-env-vars "MSAL_CLIENT_ID=${{ vars.MSAL_CLIENT_ID }} MSAL_AUTHORITY=https://login.microsoftonline.com/${{ vars.AZURE_TENANT_ID }} MSAL_REDIRECT_URI=${{ vars.MSAL_REDIRECT_URI }} BFF_API_SCOPE=${{ vars.BFF_API_SCOPE }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}" \
            --frontend-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --bff-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --indexer-identity-resource-id "${{ steps.infra.outputs.indexer-identity-resource-id }}" \
            --indexer-identity-client-id "${{ steps.infra.outputs.indexer-identity-client-id }}" \
            --indexer-env-vars "AI_SEARCH_ENDPOINT=${{ steps.infra.outputs.ai-search-endpoint }} OPENAI_ENDPOINT=${{ steps.infra.outputs.openai-endpoint }} API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }} OPENAI_API_VERSION=${{ vars.OPENAI_API_VERSION }}"
            --governance-image-tag ${{ needs.build-containers.outputs.image-tag }} \
            --governance-identity-resource-id "${{ steps.infra.outputs.governance-identity-resource-id }}" \
            --governance-identity-client-id "${{ steps.infra.outputs.governance-identity-client-id }}" \
            --governance-env-vars "API_CENTER_ENDPOINT=${{ steps.infra.outputs.api-center-endpoint }} COSMOS_DB_ENDPOINT=${{ steps.infra.outputs.cosmos-db-endpoint }} COSMOS_DB_DATABASE_NAME=${{ steps.infra.outputs.cosmos-db-database-name }} APPLICATIONINSIGHTS_CONNECTION_STRING=${{ steps.infra.outputs.appinsights-connection-string }}"
