name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;

            let size = 'small';
            let color = '0e8a16';
            let message = '';

            const totalChanges = additions + deletions;

            if (totalChanges > 1000 || changedFiles > 30) {
              size = 'large';
              color = 'd93f0b';
              message = '⚠️ This PR is quite large. Consider breaking it into smaller PRs for easier review.';
            } else if (totalChanges > 500 || changedFiles > 15) {
              size = 'medium';
              color = 'fbca04';
              message = 'ℹ️ This is a medium-sized PR. Review may take some time.';
            } else {
              message = '✅ This is a small PR, easy to review!';
            }

            // Add label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [`size/${size}`]
            });

            // Add comment if medium or large
            if (size !== 'small') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });
            }

  plan-reference:
    name: Check Plan Reference
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for plan reference
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Check if PR description mentions a plan step (e.g., "003" or "Task 003" or "step 003")
            const planPattern = /(task|step|plan)?\s*#?\d{3}/i;
            const hasPlanRef = planPattern.test(body);

            if (!hasPlanRef) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '⚠️ **Missing Plan Reference**\n\n' +
                      'This PR doesn\'t appear to reference a plan step (e.g., "Task 003").\n\n' +
                      'If this PR implements a planned task, please add a reference to the plan document in the description.\n\n' +
                      'If this is an unplanned hotfix or minor change, you can safely ignore this message.'
              });

              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['needs-plan-reference']
              });
            }
