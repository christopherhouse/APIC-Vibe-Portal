name: "Security: Secret Scanning"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for common secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          FOUND=0

          # Check for AWS keys
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.py" --include="*.ts" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" . 2>/dev/null | grep -v node_modules | grep -v .git; then
            echo "::error::Potential AWS access key found"
            FOUND=1
          fi

          # Check for Azure connection strings
          if grep -rn "AccountKey=" --include="*.py" --include="*.ts" --include="*.js" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v .git | grep -v "*.md"; then
            echo "::error::Potential Azure connection string found"
            FOUND=1
          fi

          # Check for private keys
          if grep -rn "BEGIN.*PRIVATE KEY" --include="*.py" --include="*.ts" --include="*.js" --include="*.pem" --include="*.key" . 2>/dev/null | grep -v node_modules | grep -v .git; then
            echo "::error::Potential private key found"
            FOUND=1
          fi

          # Check for common password patterns in code
          if grep -rn "password\s*=\s*['\"][^'\"]*['\"]" --include="*.py" --include="*.ts" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v .git | grep -v test | grep -v mock | grep -v example | grep -vi placeholder; then
            echo "::warning::Potential hardcoded password found"
          fi

          if [ "$FOUND" -gt 0 ]; then
            echo "::error::Secret patterns detected. Please remove secrets and use Azure Key Vault."
            exit 1
          fi

          echo "✅ No secret patterns detected."
